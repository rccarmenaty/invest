rules:
  proposal:
    - Keep the paper-first and no-live-before-validation gates explicit.
    - Identify data authority and broker/account-rule assumptions before implementation.
  specs:
    - Use RFC 2119 keywords and Given/When/Then scenarios.
    - Treat missing market, earnings, and corporate-action data as fail-safe behavior.
  design:
    - Preserve hexagonal boundaries: domain has no SDK, adapter, clock, or wall-time dependencies.
    - Include replay/idempotency and safety-halt behavior for money-moving flows.
  tasks:
    - Start with contracts, ref-data, ingestor, scanner, and journal before order execution.
    - Forecast review workload and split work if estimated changed lines exceed 400.
  apply:
    tdd: true
    test_command: ''
    phase_rules:
      - Start trading logic with failing tests before implementation.
      - Do not make live trading changes without explicit live-readiness artifacts.
  verify:
    test_command: ''
    build_command: ''
    coverage_threshold: 0
    phase_rules:
      - Report unavailable tests honestly until the implementation harness exists.
  archive:
    - Preserve archived changes as an audit trail.
