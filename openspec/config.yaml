schema: spec-driven
project: invest
persistence: hybrid
strict_tdd: true

context: |
  Specification seed: SPEC.md (Momentum Breakout Trading System), dated 2026-07-11.
  Current repo has specification/scaffolding only; no implementation code or package manager files yet.
  Target stack from seed: Python-style hexagonal services, Pydantic contracts, NATS JetStream, Postgres, Alpaca, local Kubernetes.
  Architecture: event-driven microservices with pure domain packages, ports/adapters, replay/backtest before paper execution.
  Safety: paper-first; no live trading until replay, paper, and readiness gates pass.

